EnhancedAIOptions.t: "Enhanced AI: Allow space marines?"
  
EnhancedAIOptions.desc:0 "You have the option to allow the AI to field space marine divisions. Note that this will make the AI prioritize distributing its armor battalions across infantry divisions rather than concentrating them into dedicated tank divisions. Would you like to do so?"

EnhancedAIOptions.1.a: "Yes!"

EnhancedAIOptions.1.b: "No thanks."
